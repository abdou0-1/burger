<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burger Place - Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="review.html">Reviews</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="contact">
      <h2>Contact Us</h2>

      <p><strong>Email:</strong> support@burgerplace.com</p>
      <p><strong>Phone:</strong> +216 28 544 678</p>
      <p><strong>Address:</strong> Sfax, Route Tanyour KM 6.5</p>

      <h3>Send Us a Message</h3>

      <form id="contactForm">
        <label for="name">Name:</label><br />
        <input type="text" id="name" required /><br /><br />

        <label for="email">Email:</label><br />
        <input type="email" id="email" required /><br /><br />

        <label for="message">Message:</label><br />
        <textarea id="message" rows="4" required></textarea><br /><br />

        <button type="submit">Send Message</button>
      </form>

      <p id="confirmationMessage"></p>
    </section>
  </main>

  <footer>
    <p>
      &copy; 2025 Burger Place. All rights reserved |
      <a href="contact.html">Contact Us</a>
    </p>
  </footer>

  <!-- Simple JavaScript -->
  <script>
    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();

      document.getElementById("confirmationMessage").innerText =
        "Thank you! Your message has been sent successfully.";

      this.reset();
    });
  </script>

</body>
</html>
